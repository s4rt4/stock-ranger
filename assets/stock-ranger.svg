<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22262e"/>
      <stop offset="1" stop-color="#15171c"/>
    </linearGradient>
    <linearGradient id="mark" x1="256" y1="120" x2="256" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34d36b"/>
      <stop offset="0.55" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- squircle tile -->
  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#bg)"/>
  <rect x="16.75" y="16.75" width="478.5" height="478.5" rx="115.25"
        fill="none" stroke="#6366f1" stroke-opacity="0.28" stroke-width="1.5"/>

  <!-- double chevron: rank up / stock rising -->
  <g filter="url(#glow)" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- back chevron (dim, indigo) -->
    <path d="M150 322 L256 224 L362 322" stroke="#6366f1" stroke-opacity="0.45" stroke-width="40"/>
    <!-- front chevron (gradient green→indigo) -->
    <path d="M150 256 L256 158 L362 256" stroke="url(#mark)" stroke-width="46"/>
  </g>

  <!-- apex vector node -->
  <rect x="240" y="142" width="32" height="32" rx="7" transform="rotate(45 256 158)"
        fill="#e6e9ef"/>
  <rect x="246" y="148" width="20" height="20" rx="4" transform="rotate(45 256 158)"
        fill="#22c55e"/>
</svg>
